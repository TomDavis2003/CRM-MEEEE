<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM LOANITOL</title>
    <link rel="stylesheet" href="../css/styles.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
        rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>

<body>
    <!-- Login Screen (initially visible) -->
    <div id="loginContainer" class="login-container">
        <div class="login-box">
            <h2>💼 CRM LOANITOL</h2>
            <input type="text" id="loginId" placeholder="User ID">
            <input type="password" id="loginPassword" placeholder="Password">
            <button class="btn btn-primary" onclick="login()">Login</button>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <!-- Main App (initially hidden) -->
    <div id="appContainer" class="app hidden">
        <!-- Sidebar will be injected here by JS -->
        <aside class="sidebar" id="sidebar"></aside>

        <div class="main">
            <header class="topbar" id="topbar">
                <div class="topbar-title" id="pageTitle">Dashboard</div>
                <div class="search-wrap">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" class="tb-search" placeholder="Search leads...">
                </div>
                <div class="notification-wrap" onclick="toggleNotifications()">
                    <i class="fas fa-bell notification-icon"></i>
                    <span class="notification-badge" id="notificationBadge">0</span>
                </div>
                <div class="notification-dropdown" id="notificationDropdown">
                    <div class="notification-header">New Lead Alerts</div>
                    <div class="notification-list" id="notificationList"></div>
                </div>
                <button class="btn btn-primary" id="newLeadBtn">＋ New Lead</button>
                <button class="btn btn-ghost" onclick="logout()">Logout</button>
            </header>
            <div class="content" id="appContent">
                <!-- Page content will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Modal Overlay -->
    <div class="overlay" id="overlay" onclick="closeOverlay(event)">
        <div class="modal" id="modal">
            <div class="modal-hd">
                <div class="modal-title" id="modalTitle"></div>
                <button class="modal-x" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-bd" id="modalBody"></div>
            <div class="modal-ft" id="modalFoot"></div>
        </div>
    </div>

    <!-- Toasts Container -->
    <div id="toasts"></div>

    <script src="../js/app.js"></script>
</body>

</html>
